<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Просмотр: ' + ${rentalPoint.pointName}">Просмотр пункта проката</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Просмотр пункта проката</h1>
        <p class="subtitle">Детальная информация</p>
    </header>

    <!--Навигация-->
    <div class="navigation">
        <a th:href="@{/availableEquipments}" class="nav-link">📋 Инвентарь</a>
        <a th:href="@{/rentalPoints}" class="nav-link">🏪 Пункты проката</a>
        <a th:href="@{/equipmentTypes}" class="nav-link">🏋️‍♂️ Типы инвентаря</a>
    </div>

    <div class="view-container">
        <div class="rentalPoint-card">
            <div class="rentalPoint-header">
                <h2 th:text="${rentalPoint.pointName}">Название пункта проката</h2>
            </div>

            <div class="rentalPoint-details">
                <div class="detail-row">
                    <span class="detail-label">ID:</span>
                    <span class="detail-value" th:text="${rentalPoint.id}">1</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Название:</span>
                    <span class="detail-value" th:text="${rentalPoint.pointName}">
                        Название пункта проката</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Расположение:</span>
                    <span class="detail-value location-name" th:text="${rentalPoint.location}">
                        Адрес расположения</span>
                </div>


                <div class="detail-row">
                    <span class="detail-label">Часы работы:</span>
                    <span class="detail-value" th:text="${rentalPoint.openingHours}">
                        Часы работы</span>
                </div>
            </div>

            <div class="rentalPoint-actions">
                <a th:href="@{/rentalPoints/edit/{id}(id=${rentalPoint.id})}"
                   class="btn btn-primary">
                    Редактировать
                </a>
                <a th:href="@{/rentalPoints/delete/{id}(id=${rentalPoint.id})}"
                   class="btn btn-delete"
                   onclick="return confirm('Вы уверены, что хотите удалить этот пункт проката?')">
                    Удалить
                </a>
                <a th:href="@{/rentalPoints}" class="btn btn-secondary">
                    Назад к списку
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
