<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Просмотр: ' + ${equipmentType.typeName}">Просмотр типа инвентаря</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Просмотр типа инвентаря</h1>
        <p class="subtitle">Детальная информация</p>
    </header>

    <!--Навигация-->
    <div class="navigation">
        <a th:href="@{/availableEquipments}" class="nav-link">📋 Инвентарь</a>
        <a th:href="@{/rentalPoints}" class="nav-link">🏪 Пункты проката</a>
        <a th:href="@{/equipmentTypes}" class="nav-link">🏋️‍♂️ Типы инвентаря</a>
    </div>

    <div class="view-container">
        <div class="equipmentType-card">
            <div class="equipmentType-header">
                <h2 th:text="${equipmentType.typeName}">Название типа инвентаря</h2>
            </div>

            <div class="equipmentType-details">
                <div class="detail-row">
                    <span class="detail-label">ID:</span>
                    <span class="detail-value" th:text="${equipmentType.id}">1</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Название:</span>
                    <span class="detail-value" th:text="${equipmentType.typeName}">
                        Название типа инвентаря</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Категория:</span>
                    <span class="detail-value category-name" th:text="${equipmentType.category}">
                        Категория</span>
                </div>

                <div class="detail-row description-row"
                     th:if="${equipmentType.description != null and
                     !#strings.isEmpty(equipmentType.description)}">
                    <span class="detail-label">Описание:</span>
                    <p class="detail-value description-text" th:text="${equipmentType.description}">
                    </p>
                </div>
            </div>

            <div class="equipmentType-actions">
                <a th:href="@{/equipmentTypes/edit/{id}(id=${equipmentType.id})}"
                   class="btn btn-primary">
                    Редактировать
                </a>
                <a th:href="@{/equipmentTypes/delete/{id}(id=${equipmentType.id})}"
                   class="btn btn-delete"
                   onclick="return confirm('Вы уверены, что хотите удалить этот тип инвентаря?')">
                    Удалить
                </a>
                <a th:href="@{/equipmentTypes}" class="btn btn-secondary">
                    Назад к списку
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
